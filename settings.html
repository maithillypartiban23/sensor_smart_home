<!DOCTYPE html>
<html>
<head>
     <meta charset="UTF-8">
<title>Device Settings</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: "Segoe UI", Arial, sans-serif; }

body { background: #f0f4f8; }

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
  color: white;
  padding: 0 30px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.header-icon {
  width: 40px; height: 40px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.header-title { font-size: 20px; font-weight: 700; letter-spacing: 0.2px; }
.header-right { display: flex; align-items: center; gap: 16px; }
.header-badge {
  display: flex; align-items: center; gap: 7px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 13px;
  color: rgba(255,255,255,0.9);
}
.header-badge.connected { color: #4ade80; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; }

/* ── Nav ── */
.nav {
  background: white;
  border-bottom: 1px solid #e2e8f0;
  padding: 0 30px;
  display: flex;
  gap: 0;
}
.nav a {
  text-decoration: none;
  padding: 16px 24px;
  color: #64748b;
  font-size: 14px;
  font-weight: 500;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 3px solid transparent;
  transition: color 0.2s;
}
.nav a.active {
  color: #2563eb;
  border-bottom-color: #2563eb;
  font-weight: 600;
}
.nav a:hover { color: #2563eb; }

/* ── Settings panel ── */
.page {
  display: flex;
  justify-content: center;
  padding: 40px 20px 60px;
}

.panel {
  background: white;
  width: 100%;
  max-width: 520px;
  border-radius: 18px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  padding: 32px 36px 36px;
}

.panel-top {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 28px;
}
.panel-icon {
  width: 52px; height: 52px;
  background: #eff6ff;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.panel-top-text h2 {
  font-size: 18px;
  font-weight: 700;
  color: #0f172a;
  margin-bottom: 4px;
}
.panel-top-text p {
  font-size: 13px;
  color: #64748b;
}

.field { margin-bottom: 20px; }
.field label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: #334155;
  margin-bottom: 7px;
}
.input-wrap {
  display: flex;
  align-items: center;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  padding: 0 14px;
  background: white;
  height: 48px;
  transition: border-color 0.2s;
}
.input-wrap:focus-within { border-color: #2563eb; }
.input-wrap input {
  border: none; outline: none;
  font-size: 15px; color: #0f172a;
  background: transparent;
  width: 100%; height: 100%;
}
.input-unit {
  font-size: 13px;
  color: #94a3b8;
  flex-shrink: 0;
  margin-left: 8px;
}

.btn-save {
  margin-top: 8px;
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background 0.2s;
}
.btn-save:hover { background: #1d4ed8; }

#message {
  margin-top: 16px;
  font-size: 14px;
  font-weight: 600;
  color: #16a34a;
  text-align: center;
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="header-icon">🏠</div>
    <span class="header-title">Smart Home IoT Monitoring Dashboard</span>
  </div>
  <div class="header-right">
    <div class="header-badge">🕐 <span id="clock">--:-- --</span></div>
    <div class="header-badge connected"><div class="dot"></div> Connected</div>
  </div>
</div>

<!-- Nav -->
<div class="nav">
  <a href="index.html">⊞ Dashboard</a>
  <a href="history.html">🕐 History</a>
  <a href="settings.html" class="active">⚙ Settings</a>
</div>

<!-- Settings Panel -->
<div class="page">
  <div class="panel">

    <div class="panel-top">
      <div class="panel-icon">⚙️</div>
      <div class="panel-top-text">
        <h2>Update Threshold Values</h2>
        <p>Configure the threshold values for your smart home devices.</p>
      </div>
    </div>

    <form id="settingsForm">

      <div class="field">
        <label>Temperature Threshold (°C)</label>
        <div class="input-wrap">
          <input type="number" id="temperature" value="35">
          <span class="input-unit">°C</span>
        </div>
      </div>

      <div class="field">
        <label>Gas Threshold</label>
        <div class="input-wrap">
          <input type="number" id="gas" value="400">
        </div>
      </div>


      <button type="submit" class="btn-save">💾 SAVE SETTINGS</button>

    </form>

    <div id="message"></div>

  </div>
</div>

<!-- Clock -->
<script>
function updateClock(){
  const now=new Date();
  let h=now.getHours(), m=now.getMinutes().toString().padStart(2,'0');
  const ampm=h>=12?'PM':'AM'; h=h%12||12;
  document.getElementById('clock').textContent=h+':'+m+' '+ampm;
}
updateClock(); setInterval(updateClock,1000);
</script>

<script>

function loadSettings(){
  fetch("get_settings.php?device_id=ESP32_01&t="+Date.now())
    .then(r=>r.json())
    .then(data=>{
      if(data.temperature_threshold) document.getElementById("temperature").value = data.temperature_threshold;
      if(data.gas_threshold)         document.getElementById("gas").value         = data.gas_threshold;
    })
    .catch(()=>{});
}
loadSettings();

document.getElementById("settingsForm")

.addEventListener(

"submit",

function(e){

e.preventDefault();

let form = new FormData();

form.append(

"device_id",

"ESP32_01"

);

form.append(

"temperature_threshold",

document.getElementById("temperature").value

);

form.append(

"gas_threshold",

document.getElementById("gas").value

);

fetch(

"update_settings.php",

{

method:"POST",

body:form

}

)

.then(response=>response.text())

.then(data=>{

document.getElementById("message").innerHTML=data;

});

});

</script>

</body>
</html>
